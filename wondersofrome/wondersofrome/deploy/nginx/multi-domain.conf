# Nginx Configuration for Multi-Domain Hosting
# Both websites on same Hetzner server (91.98.205.197)
#
# Domains:
#   - rome-tour-tickets.com → localhost:3000
#   - wondersofrome.com → localhost:3002
#
# Place this file in: /etc/nginx/sites-available/default
# Or create separate files and symlink

# ============================================
# HTTP → HTTPS Redirect (Port 80)
# ============================================
server {
    listen 80;
    server_name ticketsinrome.com www.ticketsinrome.com;
    return 301 https://ticketsinrome.com$request_uri;
}

server {
    listen 80;
    server_name wondersofrome.com www.wondersofrome.com;
    return 301 https://wondersofrome.com$request_uri;
}

# ============================================
# ROME TOUR TICKETS (Site 1)
# ============================================
server {
    listen 443 ssl http2;
    server_name ticketsinrome.com www.ticketsinrome.com;

    # SSL Certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/ticketsinrome.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ticketsinrome.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/ticketsinrome-access.log;
    error_log /var/log/nginx/ticketsinrome-error.log;

    # Static files caching
    location /_next/static {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable";
    }

    location /static {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable";
    }

    # Main proxy to Next.js
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# ============================================
# WONDERS OF ROME (Site 2)
